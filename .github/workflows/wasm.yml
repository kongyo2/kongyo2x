name: Wasm

# Builds the Rust numeric kernels to WebAssembly and checks that the module
# still instantiates and exports every kernel the TypeScript loader expects.
# The optimized wasm/kongyo2x.wasm artifact is committed, so this job guards the
# Rust sources rather than regenerating the shipped binary.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "scripts/build-wasm.sh"
      - ".github/workflows/wasm.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build kernels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: cargo build -p kongyo2x-wasm --target wasm32-unknown-unknown --release
      - name: Verify exports
        run: |
          node -e "
          const fs = require('fs');
          const bytes = fs.readFileSync('target/wasm32-unknown-unknown/release/kongyo2x_wasm.wasm');
          const mod = new WebAssembly.Module(bytes);
          const names = WebAssembly.Module.exports(mod).map((e) => e.name);
          const need = ['memory','kw_alloc','kw_dealloc','conv_forward','deconv_forward','conv_forward_train','conv_backward_train','resize_lanczos','make_border'];
          const missing = need.filter((n) => !names.includes(n));
          if (missing.length) { console.error('missing exports:', missing); process.exit(1); }
          new WebAssembly.Instance(mod, {});
          console.log('ok: all kernels exported and module instantiates');
          "
