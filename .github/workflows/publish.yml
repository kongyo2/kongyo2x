name: Publish

# Manually publish the current branch to npm.
#
# Requires an `NPM_TOKEN` repository secret (an npm automation token with publish
# rights for the @kongyo2 scope). `id-token: write` lets npm attach a provenance
# attestation. `npm ci --ignore-scripts` mirrors ci.yml: it skips the headless-gl
# native build that needs X11 libraries the runner lacks; the package builds with
# plain `tsc`, so publishing is unaffected.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Pack and validate without publishing
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Publish
        run: |
          npm publish --access public --ignore-scripts \
            ${{ inputs.dry_run && '--dry-run' || '--provenance' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
