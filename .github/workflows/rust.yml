name: Rust

# Rust CI for the WebAssembly numeric kernels: formatting, clippy lints, and the
# wasm build. The optimized wasm/kongyo2x.wasm artifact is committed, so the
# build job also confirms the shipped binary instantiates and exports every
# kernel the TypeScript loader expects (a stale or corrupt blob would otherwise
# fall back to the pure-TS backend at runtime and go unnoticed).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "scripts/build-wasm.sh"
      - "wasm/kongyo2x.wasm"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - run: cargo clippy -p kongyo2x-wasm --target wasm32-unknown-unknown -- -D warnings

  build:
    name: Build kernels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: cargo build -p kongyo2x-wasm --target wasm32-unknown-unknown --release
      - name: Verify exports
        run: |
          node -e "
          const fs = require('fs');
          const need = ['memory','kw_alloc','kw_dealloc','conv_forward','deconv_forward','conv_forward_train','conv_backward_train','resize_lanczos','make_border'];
          function check(label, path) {
            const bytes = fs.readFileSync(path);
            const mod = new WebAssembly.Module(bytes);
            const names = WebAssembly.Module.exports(mod).map((e) => e.name);
            const missing = need.filter((n) => !names.includes(n));
            if (missing.length) { console.error(label + ': missing exports:', missing); process.exit(1); }
            new WebAssembly.Instance(mod, {});
            console.log('ok: ' + label + ' exports all kernels and instantiates');
          }
          check('freshly built', 'target/wasm32-unknown-unknown/release/kongyo2x_wasm.wasm');
          check('shipped wasm/kongyo2x.wasm', 'wasm/kongyo2x.wasm');
          "
